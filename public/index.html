<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Chat</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <!-- TELA DE LOGIN/CADASTRO -->
    <div id="tela-auth">
        <h1>NEXUS</h1>
        <p class="subtitulo">chat seguro e privado</p>
        <div class="card">
            <div class="tabs">
                <div class="tab ativo" onclick="mudarTab('login')">Entrar</div>
                <div class="tab" onclick="mudarTab('registrar')">Criar conta</div>
            </div>
            <div id="form-login">
                <div class="campo">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="seu username" />
                </div>
                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="login-senha" placeholder="sua senha" />
                </div>
                <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
            </div>
            <div id="form-registrar" style="display:none;">
                <div class="campo">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="escolha um username" />
                </div>
                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="reg-senha" placeholder="mínimo 6 caracteres" />
                </div>
                <button class="btn-primary" onclick="fazerRegistro()">Criar conta</button>
            </div>
            <div id="erro-auth"></div>
        </div>
    </div>

    <!-- TELA DE CHAT -->
    <div id="tela-chat">

        <!-- SIDEBAR -->
        <div id="sidebar">
            <div id="sidebar-header">
                <span class="logo">NEXUS</span>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span id="usuario-logado"></span>
                    <button onclick="abrirModalGrupo()" style="background:none; border:1px solid #30363d; border-radius:6px; color:#8b949e; padding:4px 8px; cursor:pointer; font-size:0.75rem;">+ Grupo</button>
                </div>
            </div>

            <div id="busca-usuario">
                <input type="text" id="input-busca" placeholder="Buscar ou iniciar conversa..."
                    oninput="buscarUsuario(this.value)" />
            </div>

            <div id="lista-conversas"></div>

            <button id="btn-logout" onclick="logout()">⬡ Sair</button>
        </div>

        <!-- ÁREA DE CHAT -->
        <div id="area-chat">
            <div id="tela-vazia">
                <span style="font-size:2rem;">⬡</span>
                <span>Selecione uma conversa ou busque um usuário</span>
            </div>

            <div id="conversa-aberta" style="display:none; flex-direction:column; height:100%;">
                <div id="chat-header">
                    <button id="btn-voltar" onclick="voltarSidebar()" 
                        style="display:none; background:none; border:none; color:#58a6ff; font-size:1.2rem; cursor:pointer; margin-right:8px;">←</button>
                    <div class="avatar" id="header-avatar"></div>
                    <span class="nome-conversa" id="header-nome"></span>
                </div>

                <div id="mensagens"></div>
                
                <div id="preview-arquivo" style="display:none; padding:8px 20px; background:#161b22; border-top:1px solid #30363d; align-items:center; gap:10px;">
                    <div id="preview-conteudo" style="flex:1;"></div>
                    <button onclick="cancelarArquivo()" style="background:none; border:none; color:#f85149; cursor:pointer; font-size:1.1rem;">✕</button>
                </div>

                <div id="indicador-digitando" style="display:none; padding:6px 20px; color:#6e7681; font-size:0.8rem; font-style:italic;">
                    <span id="texto-digitando"></span>
                </div>
                
                <div id="input-area">
                    <input type="file" id="input-arquivo" style="display:none" />
                    <button class="btn-anexo" onclick="document.getElementById('input-arquivo').click()">📎</button>
                    <textarea id="input-mensagem" rows="1" placeholder="Digite uma mensagem..."></textarea>
                    <button class="btn-enviar" onclick="enviarMensagem()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL GRUPO -->
    <div id="modal-grupo" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center;">
        <div style="background:#161b22; border:1px solid #30363d; border-radius:12px; padding:24px; width:100%; max-width:360px;">
            <h3 style="margin-bottom:16px; color:#c9d1d9;">Criar Grupo</h3>
            <div class="campo">
                <label>Nome do grupo</label>
                <input type="text" id="grupo-nome" placeholder="Ex: Trabalho, Amigos..." />
            </div>
            <div class="campo">
                <label>Adicionar participantes</label>
                <input type="text" id="grupo-busca" placeholder="Buscar usuário..." oninput="buscarParaGrupo(this.value)" />
            </div>
            <div id="grupo-resultados" style="margin-bottom:12px;"></div>
            <div id="grupo-selecionados" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px;"></div>
            <div style="display:flex; gap:10px;">
                <button onclick="fecharModalGrupo()" style="flex:1; padding:10px; background:none; border:1px solid #30363d; border-radius:8px; color:#c9d1d9; cursor:pointer;">Cancelar</button>
                <button onclick="criarGrupo()" style="flex:1; padding:10px; background:#238636; border:none; border-radius:8px; color:white; cursor:pointer;">Criar</button>
            </div>
        </div>
    </div>

    <script src="/nacl.js"></script>
    <script src="/nacl-util.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let token = localStorage.getItem('token')
        let usuarioAtual = JSON.parse(localStorage.getItem('usuario') || 'null')
        let conversaAtualId = null
        let socket = null
        let sodium = null
        let conversaAtualPrivada = false
        let chavePublicaDestinatario = null
        let chavePublicaDestinatarioId = null

        async function inicializarSodium() {
            return true
        }

        async function gerarChaves() {
            const par = nacl.box.keyPair()
            return {
                chavePublica: nacl.util.encodeBase64(par.publicKey),
                chavePrivada: nacl.util.encodeBase64(par.secretKey)
            }
        }

        async function criptografarMensagem(conteudo, chavePublicaDestinatarioB64, chavePrivadaRemetenteB64) {
            const chavePublicaDestinatario = nacl.util.decodeBase64(chavePublicaDestinatarioB64)
            const chavePrivadaRemetente = nacl.util.decodeBase64(chavePrivadaRemetenteB64)
            const chavePublicaRemetente = nacl.util.decodeBase64(localStorage.getItem('chave_publica'))
            const mensagemBytes = nacl.util.decodeUTF8(conteudo)

            const nonce1 = nacl.randomBytes(nacl.box.nonceLength)
            const nonce2 = nacl.randomBytes(nacl.box.nonceLength)

            const cifradoDestinatario = nacl.box(mensagemBytes, nonce1, chavePublicaDestinatario, chavePrivadaRemetente)
            const cifradoRemetente = nacl.box(mensagemBytes, nonce2, chavePublicaRemetente, chavePrivadaRemetente)

            return {
                para_destinatario: {
                    cifrado: nacl.util.encodeBase64(cifradoDestinatario),
                    nonce: nacl.util.encodeBase64(nonce1)
                },
                para_remetente: {
                    cifrado: nacl.util.encodeBase64(cifradoRemetente),
                    nonce: nacl.util.encodeBase64(nonce2)
                },
                criptografado: true
            }
        }

        if (token && usuarioAtual) mostrarChat()

        function mudarTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'))
            document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none'
            document.getElementById('form-registrar').style.display = tab === 'registrar' ? 'block' : 'none'
            event.target.classList.add('ativo')
            document.getElementById('erro-auth').textContent = ''
        }

        async function fazerLogin() {
            const username = document.getElementById('login-username').value.trim()
            const senha = document.getElementById('login-senha').value
            const erro = document.getElementById('erro-auth')

            const resposta = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, senha })
            })

            const dados = await resposta.json()

            if (dados.erro) {
                erro.textContent = dados.erro
                return
            }

            const temChaves = localStorage.getItem('chave_privada')
            await salvarSessao(dados, !temChaves)
            mostrarChat()
        }

        async function fazerRegistro() {
            const username = document.getElementById('reg-username').value.trim()
            const senha = document.getElementById('reg-senha').value
            const erro = document.getElementById('erro-auth')
            const resposta = await fetch('/auth/registrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, senha })
            })
            const dados = await resposta.json()
            if (dados.erro) { erro.textContent = dados.erro; return }
            salvarSessao(dados, true)
            mostrarChat()
        }

        async function salvarSessao(dados, novoUsuario = false) {
            token = dados.token
            usuarioAtual = { id: dados.id, username: dados.username }
            localStorage.setItem('token', token)
            localStorage.setItem('usuario', JSON.stringify(usuarioAtual))

            if (novoUsuario) {
                const { chavePublica, chavePrivada } = await gerarChaves()
                localStorage.setItem('chave_privada', chavePrivada)
                localStorage.setItem('chave_publica', chavePublica)

                await fetch('/usuarios/chave-publica', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ chave_publica: chavePublica })
                })
            }
        }

        function mostrarChat() {
            document.getElementById('tela-auth').style.display = 'none'
            document.getElementById('tela-chat').style.display = 'flex'
            document.getElementById('usuario-logado').textContent = '@' + usuarioAtual.username
            iniciarSocket()
            carregarConversas()
        }

        function logout() {
            localStorage.removeItem('token')
            localStorage.removeItem('usuario')
            location.reload()
        }

        async function iniciarSocket() {
            socket = io({ auth: { token } })
            socket.on('connect', () => console.log('Socket conectado'))
            
            socket.on('nova-mensagem', async (mensagem) => {
                if (mensagem.conversa_id === conversaAtualId) {
                    if (!chavePublicaDestinatario && conversaAtualPrivada && mensagem.remetente_id !== usuarioAtual.id) {
                        const resposta = await fetch(`/usuarios/${mensagem.remetente_id}/chave-publica`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        })
                        const dados = await resposta.json()
                        chavePublicaDestinatario = dados.chave_publica
                    }
                    await adicionarBalao(mensagem)
                }
                carregarConversas()
            })

            socket.on('atualizar-conversas', () => carregarConversas())
            socket.on('erro', (msg) => console.error('Erro socket:', msg))

            socket.on('usuario-digitando', (dados) => {
                if (dados.conversa_id === conversaAtualId && dados.usuario_id !== usuarioAtual.id) {
                    mostrarDigitando(dados.username)
                }
            })

            socket.on('usuario-parou', (dados) => {
                if (dados.conversa_id === conversaAtualId) {
                    esconderDigitando()
                }
            })

            socket.on('mensagem-lida', (dados) => {
                const statusEl = document.getElementById(`status-${dados.mensagem_id}`)
                if (statusEl) {
                    statusEl.textContent = ' ✓✓'
                    statusEl.classList.add('lida')
                }
            })
        }

        async function carregarConversas() {
            const resposta = await fetch('/conversas', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            const conversas = await resposta.json()
            renderizarConversas(conversas)
        }

        function renderizarConversas(conversas) {
            const lista = document.getElementById('lista-conversas')
            lista.innerHTML = ''
            
            if (conversas.length === 0) {
                lista.innerHTML = '<p style="padding:16px; color:#6e7681; font-size:0.8rem;">Nenhuma conversa ainda</p>'
                return
            }
            
            conversas.forEach(c => {
                const div = document.createElement('div')
                div.className = 'conversa-item' + (c.id === conversaAtualId ? ' ativa' : '')
                div.onclick = () => abrirConversa(c.id, c.nome, c.tipo, c.destinatario_id)

                let ultimaMsg = ''

                div.innerHTML = `
                    <div class="avatar">${c.nome[0].toUpperCase()}</div>
                    <div class="conversa-info">
                        <div class="nome">${c.nome}</div>
                    </div>
                `
                lista.appendChild(div)
            })
        }

        async function buscarUsuario(termo) {
            if (termo.length < 2) { carregarConversas(); return }
            const resposta = await fetch(`/usuarios/buscar?q=${termo}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            const usuarios = await resposta.json()
            const lista = document.getElementById('lista-conversas')
            lista.innerHTML = ''
            usuarios.forEach(u => {
                const div = document.createElement('div')
                div.className = 'conversa-item'
                div.onclick = () => iniciarConversa(u.id, u.username)
                div.innerHTML = `
                    <div class="avatar">${u.username[0].toUpperCase()}</div>
                    <div class="conversa-info">
                        <div class="nome">${u.username}</div>
                        <div class="ultima-msg">Iniciar conversa</div>
                    </div>
                `
                lista.appendChild(div)
            })
        }

        async function iniciarConversa(usuarioId, username) {
            const resposta = await fetch('/conversas', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ usuario_id: usuarioId })
            })
            const dados = await resposta.json()
            abrirConversa(dados.id, username, 'privada', usuarioId)
            carregarConversas()
        }

        async function abrirConversa(id, nome, tipo = 'privada', destinatarioId = null) {
            conversaAtualId = id
            conversaAtualPrivada = tipo === 'privada'
            chavePublicaDestinatario = null

            // busca a chave ANTES de carregar mensagens
            if (tipo === 'privada' && destinatarioId) {
                const resposta = await fetch(`/usuarios/${destinatarioId}/chave-publica`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                const dados = await resposta.json()
                chavePublicaDestinatario = dados.chave_publica
                chavePublicaDestinatarioId = destinatarioId
            }

            if (window.innerWidth <= 600) {
                document.getElementById('area-chat').classList.add('mobile-ativo')
                document.getElementById('btn-voltar').style.display = 'block'
            }

            document.getElementById('tela-vazia').style.display = 'none'
            const conv = document.getElementById('conversa-aberta')
            conv.style.display = 'flex'
            document.getElementById('header-nome').textContent = nome
            document.getElementById('header-avatar').textContent = nome[0].toUpperCase()
            document.querySelectorAll('.conversa-item').forEach(el => el.classList.remove('ativa'))

            const resposta = await fetch(`/conversas/${id}/mensagens`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            const mensagens = await resposta.json()
            const container = document.getElementById('mensagens')
            container.innerHTML = ''
            
            // processa mensagens em sequência garantindo que chave está disponível
            for (const m of mensagens) {
                await adicionarBalao(m)
            }
            
            container.scrollTop = container.scrollHeight
            socket.emit('entrar-conversa', id)
        }

        async function adicionarBalao(mensagem) {
            const container = document.getElementById('mensagens')
            const div = document.createElement('div')
            const enviada = Number(mensagem.remetente_id) === Number(usuarioAtual.id)
            const { id, remetente_id, username, conteudo, arquivo, arquivo_tipo, arquivo_nome, criado_em, lida_por, conversa_id } = mensagem
            console.log(`[DEBUG lida_por] msg_id=${id}, lida_por=`, lida_por, `typeof=${typeof lida_por}`)
            div.className = `balao ${enviada ? 'enviada' : 'recebida'}`

            const horario = new Date(mensagem.criado_em).toLocaleTimeString('pt-BR', {
                hour: '2-digit', minute: '2-digit'
            })

            let textoExibido = mensagem.conteudo || ''

            if (textoExibido) {
                try {
                    const parsed = JSON.parse(textoExibido)
                    if (parsed.criptografado) {
                        const chavePrivada = localStorage.getItem('chave_privada')

                        if (enviada) {
                            // remetente descriptografa o pacote para_remetente
                            const pacote = parsed.para_remetente
                            const cifrado = nacl.util.decodeBase64(pacote.cifrado)
                            const nonce = nacl.util.decodeBase64(pacote.nonce)
                            const chavePublica = nacl.util.decodeBase64(localStorage.getItem('chave_publica'))
                            const chavePrivadaBytes = nacl.util.decodeBase64(chavePrivada)
                            const decifrado = nacl.box.open(cifrado, nonce, chavePublica, chavePrivadaBytes)
                            textoExibido = decifrado ? nacl.util.encodeUTF8(decifrado) : '🔒 não foi possível descriptografar'
                        } else {
                            // destinatário descriptografa o pacote para_destinatario
                            if (!chavePublicaDestinatario) {
                                textoExibido = '🔒 mensagem criptografada'
                            } else {
                                const pacote = parsed.para_destinatario
                                const cifrado = nacl.util.decodeBase64(pacote.cifrado)
                                const nonce = nacl.util.decodeBase64(pacote.nonce)
                                const chavePublicaRemetente = nacl.util.decodeBase64(chavePublicaDestinatario)
                                const chavePrivadaBytes = nacl.util.decodeBase64(chavePrivada)
                                const decifrado = nacl.box.open(cifrado, nonce, chavePublicaRemetente, chavePrivadaBytes)
                                textoExibido = decifrado ? nacl.util.encodeUTF8(decifrado) : '🔒 não foi possível descriptografar'
                            }
                        }
                    }
                } catch (e) {
                    // texto normal, não era JSON
                }
            }

            let conteudoArquivo = ''
            if (mensagem.arquivo) {
                const tipo = mensagem.arquivo_tipo || ''
                if (tipo.startsWith('image/')) {
                    conteudoArquivo = `<img src="/uploads/${mensagem.arquivo}" style="max-width:100%; border-radius:8px; margin-top:6px;" />`
                } else if (tipo.startsWith('video/')) {
                    conteudoArquivo = `<video controls style="max-width:100%; border-radius:8px; margin-top:6px;">
                        <source src="/uploads/${mensagem.arquivo}" type="${tipo}">
                    </video>`
                } else {
                    conteudoArquivo = `<a href="/uploads/${mensagem.arquivo}" target="_blank" 
                        style="color:#58a6ff; font-size:0.85rem; display:block; margin-top:6px;">
                        📎 ${mensagem.arquivo_nome}
                    </a>`
                }
            }

            const lidaPor = Array.isArray(mensagem.lida_por)
                ? mensagem.lida_por
                : JSON.parse(mensagem.lida_por || '[]')
            const jaLida = lidaPor.length > 0

            div.innerHTML = `
                ${!enviada ? `<div class="remetente">${mensagem.username}</div>` : ''}
                ${textoExibido ? `<div>${textoExibido}</div>` : ''}
                ${conteudoArquivo}
                <div class="horario">
                    ${horario}
                    ${enviada ? `<span class="status-leitura ${jaLida ? 'lida' : ''}" id="status-${mensagem.id}">${jaLida ? ' ✓✓' : ' ✓'}</span>` : ''}
                </div>
            `

            if (!enviada && mensagem.id) {
                socket.emit('marcar-lida', {
                    mensagem_id: mensagem.id,
                    conversa_id: mensagem.conversa_id
                })
            }
            container.appendChild(div)
            container.scrollTop = container.scrollHeight
        }

        
        async function enviarMensagem() {
            const input = document.getElementById('input-mensagem')
            const conteudo = input.value.trim()
            const arquivoInput = document.getElementById('input-arquivo')
            const arquivo = arquivoInput.files[0]

            if ((!conteudo && !arquivo) || !conversaAtualId) return

            let conteudoFinal = conteudo

            if (conteudo && conversaAtualPrivada && chavePublicaDestinatario) {
                const chavePrivada = localStorage.getItem('chave_privada')
                const dadosCripto = await criptografarMensagem(conteudo, chavePublicaDestinatario, chavePrivada)
                conteudoFinal = JSON.stringify(dadosCripto)
            }

            if (arquivo) {
                const formData = new FormData()
                formData.append('arquivo', arquivo)
                const resposta = await fetch(`/conversas/${conversaAtualId}/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                })
                const dados = await resposta.json()
                socket.emit('mensagem', {
                    conversa_id: conversaAtualId,
                    conteudo: conteudoFinal || null,
                    arquivo: dados.arquivo,
                    arquivo_nome: dados.arquivo_nome,
                    arquivo_tipo: dados.arquivo_tipo
                })
                cancelarArquivo()
            } else {
                socket.emit('mensagem', {
                    conversa_id: conversaAtualId,
                    conteudo: conteudoFinal
                })
            }

            input.value = ''
        }

        document.getElementById('input-arquivo').addEventListener('change', function() {
            const arquivo = this.files[0]
            if (!arquivo) return

            const preview = document.getElementById('preview-arquivo')
            const conteudo = document.getElementById('preview-conteudo')
            preview.style.display = 'flex'

            if (arquivo.type.startsWith('image/')) {
                const url = URL.createObjectURL(arquivo)
                conteudo.innerHTML = `<img src="${url}" style="height:60px; border-radius:6px;" />`
            } else if (arquivo.type.startsWith('video/')) {
                conteudo.innerHTML = `<span style="color:#8b949e; font-size:0.85rem;">🎥 ${arquivo.name}</span>`
            } else {
                conteudo.innerHTML = `<span style="color:#8b949e; font-size:0.85rem;">📎 ${arquivo.name}</span>`
            }
        })

        function cancelarArquivo() {
            document.getElementById('input-arquivo').value = ''
            document.getElementById('preview-arquivo').style.display = 'none'
            document.getElementById('preview-conteudo').innerHTML = ''
        }

        document.getElementById('input-mensagem').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensagem() }
        })

        let grupoSelecionados = []

        function abrirModalGrupo() {
            grupoSelecionados = []
            document.getElementById('grupo-selecionados').innerHTML = ''
            document.getElementById('grupo-resultados').innerHTML = ''
            document.getElementById('grupo-nome').value = ''
            document.getElementById('grupo-busca').value = ''
            document.getElementById('modal-grupo').style.display = 'flex'
        }

        function fecharModalGrupo() {
            document.getElementById('modal-grupo').style.display = 'none'
        }

        async function buscarParaGrupo(termo) {
            if (termo.length < 2) return
            const resposta = await fetch(`/usuarios/buscar?q=${termo}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            const usuarios = await resposta.json()
            const div = document.getElementById('grupo-resultados')
            div.innerHTML = ''
            usuarios.forEach(u => {
                if (grupoSelecionados.find(s => s.id === u.id)) return
                const item = document.createElement('div')
                item.style.cssText = 'padding:8px 12px; cursor:pointer; border-radius:6px; font-size:0.85rem;'
                item.textContent = u.username
                item.onmouseover = () => item.style.background = '#21262d'
                item.onmouseout = () => item.style.background = 'none'
                item.onclick = () => adicionarAoGrupo(u)
                div.appendChild(item)
            })
        }

        function adicionarAoGrupo(usuario) {
            if (grupoSelecionados.find(u => u.id === usuario.id)) return
            grupoSelecionados.push(usuario)
            const div = document.getElementById('grupo-selecionados')
            const tag = document.createElement('span')
            tag.style.cssText = 'background:#1f6feb; padding:4px 10px; border-radius:20px; font-size:0.75rem; cursor:pointer;'
            tag.textContent = usuario.username + ' ×'
            tag.onclick = () => {
                grupoSelecionados = grupoSelecionados.filter(u => u.id !== usuario.id)
                tag.remove()
            }
            div.appendChild(tag)
            document.getElementById('grupo-resultados').innerHTML = ''
            document.getElementById('grupo-busca').value = ''
        }

        async function criarGrupo() {
            const nome = document.getElementById('grupo-nome').value.trim()
            if (!nome || grupoSelecionados.length < 1) {
                alert('Informe o nome e pelo menos 1 participante')
                return
            }
            const resposta = await fetch('/conversas/grupo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ nome, usuarios_ids: grupoSelecionados.map(u => u.id) })
            })
            const dados = await resposta.json()
            fecharModalGrupo()
            carregarConversas()
            abrirConversa(dados.id, dados.nome)
        }

        function voltarSidebar() {
            document.getElementById('area-chat').classList.remove('mobile-ativo')
            document.getElementById('btn-voltar').style.display = 'none'
        }

        let timeoutDigitando = null

        function mostrarDigitando(username) {
            document.getElementById('texto-digitando').textContent = `${username} está digitando...`
            document.getElementById('indicador-digitando').style.display = 'block'
        }

        function esconderDigitando() {
            document.getElementById('indicador-digitando').style.display = 'none'
            document.getElementById('texto-digitando').textContent = ''
        }

        document.getElementById('input-mensagem').addEventListener('input', () => {
            if (!conversaAtualId) return

            socket.emit('digitando', {
                conversa_id: conversaAtualId,
                username: usuarioAtual.username
            })

            clearTimeout(timeoutDigitando)
            timeoutDigitando = setTimeout(() => {
                socket.emit('parou-digitar', { conversa_id: conversaAtualId })
            }, 1500)
        })

    </script>
</body>
</html>
